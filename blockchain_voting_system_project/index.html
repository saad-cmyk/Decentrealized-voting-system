<!DOCTYPE html>
<html>
<head>
    <title>Blockchain Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Smart Contract Based E-Voting System</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="walletStatus">Wallet not connected</p>

<hr>

<h3>Vote</h3>
<button onclick="vote(0)">Vote Candidate A</button>
<button onclick="vote(1)">Vote Candidate B</button>

<hr>

<h3>Results</h3>
<button onclick="getResults()">View Results</button>
<p id="results"></p>

<!-- IMPORTANT: Web3 first, then script.js -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script src="script.js"></script>

</body>
</html>
